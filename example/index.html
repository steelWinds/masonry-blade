<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="./script.js" defer type="module"></script>
		<style>
			body {
				margin: 0;
				padding: 24px;
				font-family: Arial, sans-serif;
				background: #111;
				color: #fff;
			}

			.masonry {
				display: flex;
				gap: 16px;
				align-items: flex-start;
			}

			.column {
				display: flex;
				flex-direction: column;
				gap: 16px;
				width: 100%;
			}

			.card {
				background: #1b1b1b;
				border-radius: 12px;
				overflow: hidden;
				box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
			}

			.card img {
				display: block;
				width: 100%;
				height: auto;
			}

			.meta {
				padding: 8px 10px;
				font-size: 12px;
				color: #bbb;
			}
		</style>
		<title>Document</title>
	</head>
	<body>
		<div id="app"></div>
	</body>
</html>
